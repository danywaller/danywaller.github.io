<p>Here are places I have worked throughout my career so far!</p>

<style>
  .careermap-frame-shell {
    position: relative;
  }

  .careermap-frame {
    display: block;
    width: 100%;
    height: 720px;
    border: none;
    pointer-events: none;
  }

  .careermap-frame-shell.is-active .careermap-frame {
    pointer-events: auto;
  }

  .careermap-frame-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1rem;
    border: 0;
    background: linear-gradient(to bottom, rgba(247, 244, 237, 0.8), rgba(247, 244, 237, 0.1) 22%, rgba(247, 244, 237, 0));
    cursor: pointer;
  }

  .careermap-frame-shell.is-active .careermap-frame-overlay {
    opacity: 0;
    pointer-events: none;
  }

  .careermap-frame-overlay-label,
  .careermap-frame-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.55rem 0.85rem;
    border-radius: 999px;
    border: 1px solid rgba(44, 41, 38, 0.16);
    background: rgba(255, 255, 255, 0.96);
    color: #2c2926;
    font-size: 0.95rem;
    line-height: 1.2;
    box-shadow: 0 10px 24px rgba(44, 41, 38, 0.08);
  }

  .careermap-frame-toggle {
    position: absolute;
    top: 1rem;
    right: 1rem;
    z-index: 2;
    display: none;
    cursor: pointer;
  }

  .careermap-frame-shell.is-active .careermap-frame-toggle {
    display: inline-flex;
  }
</style>

<div class="careermap-frame-shell" data-careermap-frame>
  <button type="button" class="careermap-frame-overlay" data-careermap-activate aria-label="Activate map interaction">
    <span class="careermap-frame-overlay-label">Click to interact with the map</span>
  </button>
  <button type="button" class="careermap-frame-toggle" data-careermap-deactivate>Return to page scroll</button>
  <iframe
    class="careermap-frame"
    src="{{ '/careermap/map.html' | relative_url }}"
    title="Career map"
    loading="lazy"
  ></iframe>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const mapFrameShell = document.querySelector("[data-careermap-frame]");
    if (!mapFrameShell) {
      return;
    }

    const activateButton = mapFrameShell.querySelector("[data-careermap-activate]");
    const deactivateButton = mapFrameShell.querySelector("[data-careermap-deactivate]");
    const mapFrame = mapFrameShell.querySelector(".careermap-frame");

    function sendMapInteractionState(isActive) {
      if (!mapFrame || !mapFrame.contentWindow) {
        return;
      }

      mapFrame.contentWindow.postMessage({
        type: "careermap-interaction",
        active: isActive
      }, window.location.origin);
    }

    function setMapFrameActive(isActive) {
      mapFrameShell.classList.toggle("is-active", isActive);
      sendMapInteractionState(isActive);

      if (isActive && mapFrame) {
        mapFrame.focus();
      }
    }

    activateButton.addEventListener("click", () => {
      setMapFrameActive(true);
    });

    deactivateButton.addEventListener("click", () => {
      setMapFrameActive(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        setMapFrameActive(false);
      }
    });

    mapFrame.addEventListener("load", () => {
      sendMapInteractionState(mapFrameShell.classList.contains("is-active"));
    });
  });
</script>
