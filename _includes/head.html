{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  const htmlRoot = document.documentElement;
  const storedTheme = localStorage.getItem("theme");
  const themeSetting =
    (storedTheme === "dark" || storedTheme === "light" || storedTheme === "system")
      ? storedTheme
      : "dark";
  const computedTheme =
    themeSetting === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches
      ? "dark"
      : (themeSetting === "system" ? "light" : themeSetting);

  htmlRoot.className = htmlRoot.className.replace(/\bno-js\b/g, '') + ' js ';

  if (computedTheme === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
  } else {
    htmlRoot.removeAttribute("data-theme");
  }
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
